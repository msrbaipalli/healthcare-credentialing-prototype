<ng-container *ngIf="provider() as p; else notFound">
    <mat-card class="panel searchbar">
        <mat-icon>search</mat-icon>

        <input matInput [formControl]="searchCtrl" (keydown.enter)="saveQuery()"
            placeholder="Search within this provider (checks, ledger, evidence, timeline, notes)..." />

        <button mat-stroked-button (click)="clearSearch()" [disabled]="!searchCtrl.value">
            <mat-icon>close</mat-icon>
            Clear
        </button>
    </mat-card>

    <div class="shortcut-hint">
        <span>/ focus search</span>
        <span>Esc clear</span>
        <span>[ prev</span>
        <span>] next</span>
    </div>

    <mat-card class="panel chipbar">
        <div class="muted">Suggestions</div>
        <mat-chip-set>
            <mat-chip *ngFor="let c of suggestionChips" (click)="applySuggestion(c.value)">
                {{ c.label }}
            </mat-chip>
        </mat-chip-set>
    </mat-card>

    <mat-card class="panel chipbar" *ngIf="historySig().length > 0">
        <div class="chipbar-head">
            <div class="muted">Recent searches</div>
            <button mat-stroked-button (click)="clearHistory()">
                <mat-icon>delete</mat-icon>
                Clear history
            </button>
        </div>

        <mat-chip-set>
            <mat-chip *ngFor="let h of historySig()" (click)="applyHistory(h)">
                {{ h }}
            </mat-chip>
        </mat-chip-set>
    </mat-card>

    <mat-card class="panel tabs-shell">
        <mat-tab-group [selectedIndex]="tabIndex()" (selectedIndexChange)="setTabFromIndex($event)">
        </mat-tab-group>
    </mat-card>

    <div class="toast" *ngIf="toastSig()">{{ toastSig() }}</div>
</ng-container>

<ng-template #notFound>
    <mat-card class="panel notfound">
        <mat-icon>person_off</mat-icon>
        <div class="h1">Provider not found</div>
        <div class="muted">That provider ID does not exist in the mock dataset.</div>
        <button mat-flat-button routerLink="/">
            <mat-icon>arrow_back</mat-icon>
            Back to Dashboard
        </button>
    </mat-card>
</ng-template>
